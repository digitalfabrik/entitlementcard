description: Restores and saves fastlane cache of the current directory.
parameters:
  directory:
    type: string
    default: .
steps:
  - restore_cache:
      name: Restore gems
      keys:
        - v2-gems-{{ arch }}-{{ checksum "<< parameters.directory >>/Gemfile.lock" }}
        - v2-gems-{{ arch }}
  - run:
      name: Install fastlane
      command: |
        bundle config set path '~/.bundle'
        bundle config set frozen true
        bundle check || bundle install
      working_directory: << parameters.directory >>
  - save_cache:
      name: Save gems
      key: v2-gems-{{ arch }}-{{ checksum "<< parameters.directory >>/Gemfile.lock" }}
      paths:
        - ~/.bundle
