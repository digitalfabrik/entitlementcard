macos:
  xcode: 15.2.0
parameters:
  buildConfig:
    description: "Name of the build config to use"
    type: enum
    enum: [bayern, bayernFloss, nuernberg, koblenz]
environment:
  FASTLANE_SKIP_UPDATE_CHECK: true
working_directory: ~/project/frontend
steps:
  - prepare_workspace
  - install_app_toolbelt
  - run: # needed for circle ci mac m1 images
      name: Install rosetta
      command: softwareupdate --install-rosetta --agree-to-license
  - install_flutter:
      precache: ios
  - install_fastlane:
      directory: ios
  - install_pods
  - run:
      name: '[FL] Build'
      command: bundle exec fastlane ios build version_name:${NEW_VERSION_NAME} version_code:${NEW_VERSION_CODE} build_config_name:<< parameters.buildConfig >>
      working_directory: ios
  - store_artifacts:
      path: ~/<< parameters.buildConfig >>.ipa
  - persist_to_workspace:
      root: ~/
      paths:
        - << parameters.buildConfig >>.ipa
  - notify
